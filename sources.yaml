# glb-news-rss 매체 카탈로그
# 실행계획_v3.md §2 (총 74개 매체) 기준
#
# 구조:
#   sources:
#     - media_name: 표시명
#       country: 주 국가 코드 (KR/US/CN/JP/ID/VN/KH/MM/IN/GLOBAL)
#       language: 언어 코드
#       tier: 1 또는 2
#       categories: [GLOBAL_GENERAL, GLOBAL_ECONOMY, KR, US, ...]
#       feeds:
#         - section: business
#           url: https://...
#
# 우회 전략: 직접 RSS가 404/403/timeout인 경우 Google News 검색 RSS로 대체
#   영문: ?q=site:DOMAIN+when:1d&hl=en-US&gl=US&ceid=US:en
#   한국어: ?q=site:DOMAIN+when:1d&hl=ko&gl=KR&ceid=KR:ko
#   인도네시아어: ?q=site:DOMAIN+when:1d&hl=id&gl=ID&ceid=ID:id

sources:
  # ============================================================
  # 글로벌 종합 (4): BBC, CNN, NYT, Guardian
  # ============================================================
  - media_name: BBC
    country: GLOBAL
    language: en
    tier: 1
    categories: [GLOBAL_GENERAL]
    feeds:
      - section: world
        url: https://feeds.bbci.co.uk/news/world/rss.xml
      - section: business
        url: https://feeds.bbci.co.uk/news/business/rss.xml

  - media_name: CNN
    country: GLOBAL
    language: en
    tier: 1
    categories: [GLOBAL_GENERAL]
    feeds:
      # 직접 RSS(rss.cnn.com)는 2017년 이후 업데이트 없음 → Google News 우회
      - section: world
        url: https://news.google.com/rss/search?q=site:cnn.com+world+when:1d&hl=en-US&gl=US&ceid=US:en
      - section: business
        url: https://news.google.com/rss/search?q=site:cnn.com+business+when:1d&hl=en-US&gl=US&ceid=US:en

  - media_name: NYT
    country: US
    language: en
    tier: 1
    categories: [GLOBAL_GENERAL, US]
    feeds:
      - section: world
        url: https://rss.nytimes.com/services/xml/rss/nyt/World.xml
      - section: business
        url: https://rss.nytimes.com/services/xml/rss/nyt/Business.xml
      - section: economy
        url: https://rss.nytimes.com/services/xml/rss/nyt/Economy.xml

  - media_name: Guardian
    country: GLOBAL
    language: en
    tier: 1
    categories: [GLOBAL_GENERAL]
    feeds:
      - section: world
        url: https://www.theguardian.com/world/rss
      - section: business
        url: https://www.theguardian.com/uk/business/rss

  # ============================================================
  # 통신사 (2): Reuters, AP
  # ============================================================
  - media_name: Reuters
    country: GLOBAL
    language: en
    tier: 1
    categories: [GLOBAL_GENERAL]
    feeds:
      # 공식 RSS는 2020년대에 사실상 폐쇄. Google News 우회 피드 사용.
      - section: world
        url: https://news.google.com/rss/search?q=site:reuters.com+when:1d&hl=en-US&gl=US&ceid=US:en

  - media_name: AP
    country: GLOBAL
    language: en
    tier: 1
    categories: [GLOBAL_GENERAL]
    feeds:
      # AP도 공식 RSS 폐쇄. Google News 우회.
      - section: world
        url: https://news.google.com/rss/search?q=site:apnews.com+when:1d&hl=en-US&gl=US&ceid=US:en

  # ============================================================
  # 경제 (4): WSJ, CNBC, Bloomberg, FT
  # ============================================================
  - media_name: WSJ
    country: US
    language: en
    tier: 2
    categories: [GLOBAL_ECONOMY, US]
    feeds:
      # feeds.a.dj.com RSS는 2025-01 이후 업데이트 없음 → Google News 우회
      - section: world
        url: https://news.google.com/rss/search?q=site:wsj.com+world+when:1d&hl=en-US&gl=US&ceid=US:en
      - section: business
        url: https://news.google.com/rss/search?q=site:wsj.com+business+when:1d&hl=en-US&gl=US&ceid=US:en
      - section: markets
        url: https://news.google.com/rss/search?q=site:wsj.com+markets+when:1d&hl=en-US&gl=US&ceid=US:en

  - media_name: CNBC
    country: US
    language: en
    tier: 1
    categories: [GLOBAL_ECONOMY, US]
    feeds:
      - section: top
        url: https://www.cnbc.com/id/100003114/device/rss/rss.html
      - section: world
        url: https://www.cnbc.com/id/100727362/device/rss/rss.html
      - section: economy
        url: https://www.cnbc.com/id/20910258/device/rss/rss.html

  - media_name: Bloomberg
    country: US
    language: en
    tier: 2
    categories: [GLOBAL_ECONOMY, US]
    feeds:
      # Bloomberg 공식 RSS는 사실상 폐쇄. Google News 우회.
      - section: business
        url: https://news.google.com/rss/search?q=site:bloomberg.com+when:1d&hl=en-US&gl=US&ceid=US:en

  - media_name: FT
    country: GLOBAL
    language: en
    tier: 2
    categories: [GLOBAL_ECONOMY]
    feeds:
      - section: home
        url: https://www.ft.com/rss/home
      - section: world
        url: https://www.ft.com/world?format=rss

  # ============================================================
  # 아시아 (6): Al Jazeera, SCMP, CNA, Straits Times, Times of India, Nikkei Asia
  # ============================================================
  - media_name: Al Jazeera
    country: GLOBAL
    language: en
    tier: 1
    categories: [GLOBAL_GENERAL]
    feeds:
      - section: all
        url: https://www.aljazeera.com/xml/rss/all.xml

  - media_name: Channel News Asia
    country: SG
    language: en
    tier: 1
    categories: [GLOBAL_GENERAL, SG]
    feeds:
      - section: latest
        url: https://www.channelnewsasia.com/api/v1/rss-outbound-feed?_format=xml
      - section: business
        url: https://www.channelnewsasia.com/api/v1/rss-outbound-feed?_format=xml&category=6936

  - media_name: Straits Times
    country: SG
    language: en
    tier: 1
    categories: [GLOBAL_GENERAL, SG]
    feeds:
      - section: world
        url: https://www.straitstimes.com/news/world/rss.xml
      - section: business
