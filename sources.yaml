    feeds:
      - section: top
        url: https://www.france24.com/en/rss
      - section: business
        url: https://www.france24.com/en/business/rss

  # ============================================================
  # 영국 / 런던 (5): Bank of England, FT UK, Telegraph, City A.M., Sky News
  #   KB 런던지점 거점 모니터링용. 직접 RSS 불안정/페이월 → Google News 우회 통일.
  # ============================================================
  - media_name: Bank of England
    country: GB
    language: en
    tier: 1
    categories: [GB, GLOBAL_ECONOMY]
    feeds:
      # 영란은행 — 기준금리·MPC·인플레이션 (런던지점 핵심 소스). 직접 RSS 불안정 → Google News 우회
      - section: policy
        url: https://news.google.com/rss/search?q=site:bankofengland.co.uk+(rate+OR+policy+OR+inflation+OR+MPC+OR+statement)+when:7d&hl=en-GB&gl=GB&ceid=GB:en

  - media_name: FT UK
    country: GB
    language: en
    tier: 1
    categories: [GB, GLOBAL_ECONOMY]
    feeds:
      # FT 런던 본사 — UK 경제·금융 (기존 GLOBAL FT와 별도, 페이월 → Google News 우회)
      - section: uk
        url: https://news.google.com/rss/search?q=site:ft.com+(UK+OR+London+OR+Britain+OR+BoE+OR+sterling)+when:1d&hl=en-GB&gl=GB&ceid=GB:en

  - media_name: Telegraph
    country: GB
    language: en
    tier: 1
    categories: [GB]
