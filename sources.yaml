  - media_name: Times of India (Global)
    country: IN
    language: en
    tier: 1
    categories: [GLOBAL_GENERAL, IN]
    feeds:
      # 직접 RSS ConnectTimeout → Google News 우회
      - section: world
        url: https://news.google.com/rss/search?q=site:timesofindia.indiatimes.com+world+when:1d&hl=en-US&gl=US&ceid=US:en
      - section: business
        url: https://news.google.com/rss/search?q=site:timesofindia.indiatimes.com+business+when:1d&hl=en-US&gl=US&ceid=US:en

  - media_name: Nikkei Asia
    country: JP
    language: en
    tier: 1
    categories: [GLOBAL_GENERAL, JP]
    feeds:
      # 피드 자체에 pubDate 없음 → 기사는 수집되나 날짜 표시 안 됨 (정상)
      - section: top
        url: https://asia.nikkei.com/rss/feed/nar

  # ============================================================
  # 유럽 (2): DW, France 24
  # ============================================================
  - media_name: DW
    country: GLOBAL
    language: en
    tier: 1
    categories: [GLOBAL_GENERAL]
    feeds:
      - section: top
        url: https://rss.dw.com/rdf/rss-en-all
      - section: business
        url: https://rss.dw.com/rdf/rss-en-bus

  - media_name: France 24
